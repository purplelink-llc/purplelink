<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  .card {
    width: 1200px; height: 630px; position: relative;
    background:
      radial-gradient(1100px 700px at 78% -12%, oklch(40% 0.18 310) 0%, transparent 55%),
      radial-gradient(900px 600px at 8% 118%, oklch(34% 0.12 310) 0%, transparent 50%),
      oklch(18% 0.025 310);
    color: oklch(96% 0.01 310);
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    padding: 86px 90px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .top { display: flex; align-items: center; gap: 18px; }
  .top img { width: 56px; height: 56px; }
  .top .brand { font-family: 'Fraunces', serif; font-weight: 600; font-size: 34px; letter-spacing: -0.5px; }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 12px;
    font-size: 22px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
    color: oklch(82% 0.13 310);
  }
  .eyebrow .emoji { font-size: 34px; }
  .mid { display: flex; flex-direction: column; gap: 26px; }
  h1 {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 96px; line-height: 0.98;
    letter-spacing: -2px; max-width: 16ch;
  }
  .tagline { font-size: 36px; font-weight: 400; color: oklch(86% 0.02 300); max-width: 26ch; line-height: 1.3; }
  .bottom { display: flex; align-items: center; justify-content: space-between; }
  .url { font-size: 28px; font-weight: 600; color: oklch(80% 0.12 310); }
  .free { font-size: 24px; font-weight: 500; color: oklch(72% 0.03 300); }
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <img src="/assets/purplelink-logo.png" alt="">
      <span class="brand">Purplelink</span>
    </div>
    <div class="mid">
      <span class="eyebrow"><span class="emoji" id="emoji">∑</span> <span id="kicker">Free LaTeX tool</span></span>
      <h1 id="title">Tool</h1>
      <p class="tagline" id="tagline">Tagline</p>
    </div>
    <div class="bottom">
      <span class="url">purplelink.llc</span>
      <span class="free">No sign-up · Files never stored</span>
    </div>
  </div>
  <script>
    var TOOLS = {
      "bib-validator":     { emoji: "📚", title: "BibTeX Validator",   tagline: "Catch AI-hallucinated citations, dead DOIs & missing fields." },
      "bib-builder":       { emoji: "🔍", title: "BibTeX Builder",     tagline: "Paste DOIs or arXiv IDs, download a ready-to-use .bib file." },
      "equation-renderer": { emoji: "∑",  title: "Equation Renderer",  tagline: "Paste LaTeX math, download a high-resolution PNG." },
      "word-to-latex":     { emoji: "🔄", title: "Word → LaTeX",       tagline: "Upload a .docx, download a .tex starting point via Pandoc." }
    };
    window.renderTool = function (key) {
      var t = TOOLS[key];
      document.getElementById("emoji").textContent = t.emoji;
      document.getElementById("title").textContent = t.title;
      document.getElementById("tagline").textContent = t.tagline;
      document.title = key;
      return t.title;
    };
    window.renderTool(new URLSearchParams(location.search).get("t") || "equation-renderer");
  </script>
</body>
</html>
